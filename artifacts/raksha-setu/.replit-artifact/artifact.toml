kind = "web"
previewPath = "/"
title = "Raksha Setu"
version = "1.0.0"
id = "artifacts/raksha-setu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23534

[services.development]
run = "pnpm --filter @workspace/raksha-setu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/raksha-setu", "run", "build" ]
publicDir = "artifacts/raksha-setu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23534"
BASE_PATH = "/"
